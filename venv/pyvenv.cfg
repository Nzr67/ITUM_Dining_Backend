1. Methods used to improve voltage profile in a distribution system

The voltage profile of a distribution system can be improved using several methods to maintain the voltage within acceptable limits and reduce voltage drops. One common method is the installation of shunt capacitor banks, which provide reactive power compensation, improve the power factor, reduce line current, and minimize power losses. On-load tap changing transformers are also used to regulate voltage by adjusting the transformer turns ratio according to load variations without interrupting the supply. Voltage regulators can be installed along feeders to automatically maintain steady voltage levels, especially in long distribution lines. Feeder reconfiguration and proper load balancing help distribute loads evenly and reduce overloading conditions, thereby improving voltage stability. Upgrading conductors with larger cross-sectional areas reduces line impedance and voltage drop. In modern power systems, distributed generation sources such as solar power systems and reactive power compensation devices like SVCs and STATCOMs are also used to support voltage levels and improve overall system performance and reliability.

2. Allowable limits for distribution voltage and frequency in Sri Lanka

In Sri Lanka, the standard supply frequency is 50 Hz, and the allowable variation is generally maintained within ±1%, which means the frequency normally remains between 49.5 Hz and 50.5 Hz. The standard single-phase distribution voltage supplied to consumers is 230 V, while the three-phase supply voltage is 400 V. According to the acceptable limits, the voltage variation is usually maintained within ±6% of the nominal value. Therefore, the allowable single-phase voltage range is approximately 216 V to 244 V, while the three-phase voltage range is approximately 376 V to 424 V. Maintaining voltage and frequency within these limits is important to ensure the safe and efficient operation of electrical equipment, reduce losses, prevent overheating, and maintain good power quality for consumers.
